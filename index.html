<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskForge — Advanced Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo-mark">⬡</span>
      <h1 class="app-title">TaskForge</h1>
    </div>
    <div class="header-right">
      <div class="stats-bar">
        <div class="stat-chip">
          <span class="stat-label">Total</span>
          <span class="stat-value" id="totalCount">0</span>
        </div>
        <div class="stat-chip accent">
          <span class="stat-label">Done</span>
          <span class="stat-value" id="completedCount">0</span>
        </div>
        <div class="stat-chip muted">
          <span class="stat-label">Pending</span>
          <span class="stat-value" id="pendingCount">0</span>
        </div>
      </div>
      <!-- Dark Mode Toggle -->
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
        <span class="toggle-icon" id="themeIcon">☀️</span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="app-main">

    <!-- ADD / EDIT TASK FORM -->
    <section class="form-section" aria-label="Task Form">
      <div class="form-card" id="formCard">
        <h2 class="form-title" id="formTitle">New Task</h2>
        <div class="form-grid">
          <div class="field-group full-width">
            <label for="taskTitle">Task Title</label>
            <input type="text" id="taskTitle" placeholder="What needs to be done?" maxlength="120" autocomplete="off" />
          </div>
          <div class="field-group">
            <label for="taskDue">Due Date</label>
            <input type="date" id="taskDue" />
          </div>
          <div class="field-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="saveTaskBtn">Add Task</button>
          <button class="btn btn-ghost" id="cancelEditBtn" style="display:none;">Cancel</button>
        </div>
      </div>
    </section>

    <!-- CONTROLS: Search + Filter -->
    <section class="controls-section" aria-label="Search and Filter">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="searchInput" placeholder="Search tasks…" autocomplete="off" />
      </div>
      <div class="filter-tabs" role="tablist">
        <button class="filter-tab active" data-filter="all" role="tab">All</button>
        <button class="filter-tab" data-filter="pending" role="tab">Pending</button>
        <button class="filter-tab" data-filter="completed" role="tab">Completed</button>
      </div>
    </section>

    <!-- TASK LIST -->
    <section class="task-section" aria-label="Task List">
      <ul class="task-list" id="taskList" aria-live="polite">
        <!-- Tasks injected by JS -->
      </ul>
      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <span class="empty-icon">📭</span>
        <p>No tasks found. Add one above!</p>
      </div>
    </section>

  </main>

  <!-- ===== DELETE CONFIRMATION MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;" role="dialog" aria-modal="true" aria-label="Confirm deletion">
    <div class="modal-box">
      <h3>Delete Task?</h3>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        <button class="btn btn-ghost" id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
